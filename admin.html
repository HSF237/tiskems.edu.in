<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | TISK EMS</title>
    <link rel="icon" type="image/png" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --gold: #fbbf24;
            --white: #ffffff;
            --bg: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Login Screen --- */
        .login-container {
            background: var(--white);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h1 {
            font-family: 'Outfit';
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #64748b;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }

        /* --- Dashboard Screen (Hidden by default) --- */
        #dashboard {
            display: none;
            width: 95%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            flex-direction: row;
        }

        .sidebar {
            width: 280px;
            background: var(--primary);
            color: white;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar h2 {
            font-family: 'Outfit';
            margin-bottom: 30px;
            padding-left: 15px;
        }

        .nav-item {
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item.active {
            background: var(--accent);
        }

        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .upload-section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .upload-section.active {
            display: block;
        }

        .drop-zone {
            border: 2px dashed #e2e8f0;
            padding: 60px;
            text-align: center;
            border-radius: 20px;
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .drop-zone:hover {
            border-color: var(--accent);
            background: #f0f9ff;
        }

        .drop-zone i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .btn-logout {
            margin-top: auto;
            color: #fca5a5;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mock-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .mock-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            position: relative;
        }

        .mock-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ef4444;
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.7rem;
        }
    </style>
</head>

<body>

    <!-- Login Container -->
    <div id="login-screen" class="login-container">
        <h1>Staff Login</h1>
        <div class="input-group">
            <label>Staff ID / Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button class="login-btn" onclick="handleLogin()">Access Dashboard</button>
        <p style="margin-top: 20px; font-size: 0.8rem; color: #94a3b8;">Default: admin / admin (for testing)</p>
    </div>

    <!-- Dashboard Container -->
    <div id="dashboard">
        <div class="sidebar">
            <h2>TISK Admin</h2>
            <div class="nav-item active" data-panel="gallery" onclick="showPanel('gallery')"><i
                    class="fas fa-images"></i> Gallery</div>
            <div class="nav-item" data-panel="tc" onclick="showPanel('tc')"><i class="fas fa-file-pdf"></i> TC
                Management</div>
            <div class="nav-item btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>

        <div class="main-content">
            <div class="panel-header">
                <h1 id="panel-title">Gallery Management</h1>
            </div>

            <!-- Gallery Panel -->
            <div id="gallery-panel" class="upload-section active">
                <div class="input-group">
                    <label>Gallery Title (e.g. Holi Celebration, Science Exhibition)</label>
                    <input type="text" id="gallery-title" placeholder="Enter a title for the gallery group">
                </div>
                <div class="drop-zone" onclick="uploadGallery()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h3>Upload New Image</h3>
                    <p>Click here to select an image for your gallery</p>
                </div>
                <h3>Active Gallery Content</h3>
                <div id="gallery-list" class="mock-list"></div>
            </div>

            <!-- TC Panel -->
            <div id="tc-panel" class="upload-section">
                <div class="input-group">
                    <label>Search/Verify Students</label>
                    <input type="text" id="tc-adm" placeholder="Student Admission Number (e.g. 2024-001)">
                </div>
                <div class="input-group">
                    <label>Student Name</label>
                    <input type="text" id="tc-name" placeholder="Full Student Name">
                </div>
                <div class="input-group">
                    <label>Class</label>
                    <input type="text" id="tc-class" placeholder="Standard (e.g. VII-C)">
                </div>
                <div class="drop-zone" onclick="uploadTC()">
                    <i class="fas fa-file-pdf"></i>
                    <h3>Upload Student TC (PDF)</h3>
                    <p>Click here to select and upload the PDF file</p>
                </div>
                <h3>Recently Uploaded TCs</h3>
                <div id="tc-list" class="mock-list"></div>
            </div>

            <!-- Disclosure upload removed -->
        </div>
    </div>

    <script>
        const BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5001'
            : 'https://tisk-backend.onrender.com';
        const API_URL = `${BASE_URL}/api`;
        let currentUser = null;
        let token = localStorage.getItem('tisk_token');

        // Check if already logged in
        if (token) {
            checkAuth();
        }

        async function checkAuth() {
            try {
                const res = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    currentUser = data.user;
                    if (currentUser.role !== 'admin') {
                        alert('Admin access required');
                        logout();
                        return;
                    }
                    showDashboard();
                } else {
                    logout();
                }
            } catch (err) {
                console.error('Auth check failed', err);
            }
        }

        async function handleLogin() {
            const email = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    if (data.user.role !== 'admin') {
                        return alert('Only administrators can access this portal');
                    }
                    token = data.token;
                    localStorage.setItem('tisk_token', token);
                    currentUser = data.user;
                    showDashboard();
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (err) {
                alert('Connection error. Is the server running?');
            }
        }

        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            loadData('gallery');
        }

        function showPanel(panel) {
            document.querySelectorAll('.upload-section').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

            const panelElement = document.getElementById(panel + '-panel');
            if (panelElement) panelElement.classList.add('active');

            const activeNav = document.querySelector(`.nav-item[data-panel="${panel}"]`);
            if (activeNav) activeNav.classList.add('active');

            document.getElementById('panel-title').innerText = panel.toUpperCase() + ' Management';
            loadData(panel);
        }

        async function loadData(type) {
            try {
                const res = await fetch(`${API_URL}/${type}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    renderLists(type, data.data);
                }
            } catch (err) {
                console.error(`Failed to load ${type}`, err);
            }
        }

        function logout() {
            localStorage.removeItem('tisk_token');
            location.reload();
        }

        // --- Actual Upload Logic ---

        async function uploadGallery() {
            const titleInput = document.getElementById('gallery-title');
            const title = titleInput.value.trim() || 'Gallery Image';

            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.onchange = async () => {
                const file = fileInput.files[0];
                const formData = new FormData();
                formData.append('image', file);
                formData.append('title', title);
                formData.append('description', title);

                try {
                    const res = await fetch(`${API_URL}/gallery`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    const data = await res.json();
                    if (data.success) {
                        alert('Image uploaded successfully');
                        titleInput.value = '';
                        loadData('gallery');
                    } else {
                        alert(data.message);
                    }
                } catch (err) {
                    alert('Upload failed');
                }
            };
            fileInput.click();
        }

        async function uploadTC() {
            const adm = document.getElementById('tc-adm').value.trim();
            const name = document.getElementById('tc-name').value.trim();
            const studentClass = document.getElementById('tc-class').value.trim();

            if (!adm || !name || !studentClass) {
                return alert('Please fill in Admission Number, Name, and Class before uploading.');
            }

            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.pdf';
            fileInput.onchange = async () => {
                const file = fileInput.files[0];
                const formData = new FormData();
                formData.append('tcFile', file);
                formData.append('studentName', name);
                formData.append('admissionNumber', adm);
                formData.append('class', studentClass);
                formData.append('dateOfLeaving', new Date().toISOString());

                try {
                    const res = await fetch(`${API_URL}/tc/upload`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    const data = await res.json();
                    if (data.success) {
                        alert('TC uploaded successfully');
                        document.getElementById('tc-adm').value = '';
                        document.getElementById('tc-name').value = '';
                        document.getElementById('tc-class').value = '';
                        loadData('tc');
                    } else {
                        alert(data.message);
                    }
                } catch (err) {
                    alert('Upload failed');
                }
            };
            fileInput.click();
        }

        function renderLists(type, items) {
            const list = document.getElementById(type + '-list');
            if (!list) return;

            if (type === 'gallery') {
                list.innerHTML = items.map(item => `
                    <div class="mock-item">
                        <button class="delete-btn" onclick="removeItem('gallery', '${item._id}')">×</button>
                        <img src="${BASE_URL}/${item.filePath.replace(/\\/g, '/')}">
                        <p style="font-size:0.75rem; font-weight:600; margin-top:5px;">${item.title || 'Untitled'}</p>
                    </div>
                `).join('');
            } else if (type === 'tc') {
                list.innerHTML = items.map(item => `
                    <div class="mock-item">
                        <button class="delete-btn" onclick="removeItem('tc', '${item._id}')">×</button>
                        <i class="fas fa-file-pdf" style="font-size:2rem; color:var(--accent); margin-bottom:10px;"></i>
                        <p style="font-size:0.85rem; font-weight:600;">${item.studentName}</p>
                        <p style="font-size:0.75rem; color:#475569;">Adm: ${item.admissionNumber} | Class: ${item.class}</p>
                        <a href="${BASE_URL}/${item.pdfPath.replace(/\\/g, '/')}" target="_blank" style="color:var(--accent); text-decoration:none; font-size:0.75rem; font-weight:600; margin-top:10px; display:inline-block;">View TC</a>
                    </div>
                `).join('');
            }
        }

        async function removeItem(type, id) {
            if (!confirm(`Are you sure you want to delete this ${type} item?`)) return;

            try {
                const endpoint = type === 'gallery' ? `${API_URL}/gallery/${id}` : `${API_URL}/tc/${id}`;
                const res = await fetch(endpoint, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await res.json();
                if (data.success) {
                    loadData(type);
                }
            } catch (err) {
                alert('Delete failed');
            }
        }
    </script>

</body>

</html>
